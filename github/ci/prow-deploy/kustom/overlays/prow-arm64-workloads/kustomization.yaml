# Requires kustomize v3
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - &gcs_credentials
    name: gcs-credentials
    namespace: kubevirt-prow-jobs
    files:
      - secrets/service-account.json
    type: Opaque
  # For backward compatibility
  - <<: *gcs_credentials
    name: gcs
