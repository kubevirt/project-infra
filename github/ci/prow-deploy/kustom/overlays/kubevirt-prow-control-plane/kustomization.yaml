# Requires kustomize v3
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../components/docker-mirror-proxy/base
  - ../../components/greenhouse/base
  - resources/crier-rbac.yaml
  - resources/deck-rbac.yaml
  - resources/docker-mirror-proxy_pvc.yaml
  - resources/hook-rbac.yaml
  - resources/horologium-rbac.yaml
  - resources/prow-controller-manager-rbac.yaml
  - resources/prow-exporter-deployment.yaml
  - resources/prow-exporter-rbac.yaml
  - resources/prow-exporter-service.yaml
  - resources/sinker-rbac.yaml
  - resources/statusreconciler-rbac.yaml
  - resources/tide-rbac.yaml
  # templated resources
  - resources/admin-rbac.yaml

components:
  - ../../components/docker-mirror-proxy/pv
  - ../../components/greenhouse/pv

patches:
  - target: &deployment_target
      version: v1
      group: apps
      kind: Deployment
      name: rehearse
    path: patches/JsonRFC6902/prow-rehearse-deployment.yaml
  - target:
      <<: *deployment_target
      name: test-subset
    path: patches/JsonRFC6902/test-subset-deployment.yaml
  - target:
      <<: *deployment_target
      name: gcsweb
    path: patches/JsonRFC6902/gcsweb-deployment.yaml
  - target:
      <<: *deployment_target
      name: deck
    path: patches/JsonRFC6902/deck_deployment.yaml
  - target:
      <<: *deployment_target
      name: hook
    path: patches/JsonRFC6902/hook_deployment.yaml
  - target:
      <<: *deployment_target
      name: horologium
    path: patches/JsonRFC6902/horologium_deployment.yaml
  - target:
      <<: *deployment_target
      name: statusreconciler
    path: patches/JsonRFC6902/statusreconciler_deployment.yaml
  - target:
      <<: *deployment_target
      name: tide
    path: patches/JsonRFC6902/tide_deployment.yaml
  - target:
      <<: *deployment_target
      name: cherrypicker
    path: patches/JsonRFC6902/cherrypicker_deployment.yaml
  - target:
      <<: *deployment_target
      name: crier
    path: patches/JsonRFC6902/crier_deployment.yaml
  - target:
      <<: *deployment_target
      name: prow-controller-manager
    path: patches/JsonRFC6902/prow_controller_manager_deployment.yaml
  - target:
      <<: *deployment_target
      name: sinker
    path: patches/JsonRFC6902/sinker_deployment.yaml
  - target:
      <<: *deployment_target
      name: pushgateway
    path: patches/JsonRFC6902/pushgateway_deployment.yaml
  - target:
      <<: *deployment_target
      name: pushgateway-proxy
    path: patches/JsonRFC6902/pushgateway_proxy_deployment.yaml
  - target: &ingress_target
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: prow
    path: patches/JsonRFC6902/prow_ingress.yaml
  - target:
      version: v1
      kind: PersistentVolumeClaim
      name: ghproxy
    path: patches/StrategicMerge/ghproxy.yaml

  # namespaces
  - target:
      <<: *deployment_target
      namespace: default
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      <<: *deployment_target
      namespace: prow
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target: &pvc_target
      version: v1
      kind: PersistentVolumeClaim
      namespace: default
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      <<: *pvc_target
      namespace: prow
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target: &service_target
      version: v1
      kind: Service
      namespace: default
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      <<: *service_target
      namespace: prow
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target: &configmap_target
      version: v1
      kind: ConfigMap
      namespace: default
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      <<: *configmap_target
      namespace: prow
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target: &serviceaccount_target
      version: v1
      kind: ServiceAccount
      namespace: default
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      <<: *serviceaccount_target
      namespace: prow
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target: &role_target
      group: rbac.authorization.k8s.io
      version: v1
      kind: Role
      namespace: default
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      <<: *role_target
      namespace: prow
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      <<: *role_target
      namespace: test-pods
      name: .*
    path: patches/JsonRFC6902/prow-jobs-namespace.yaml
  - target: &rolebinding_target
      group: rbac.authorization.k8s.io
      version: v1
      kind: RoleBinding
      namespace: default
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      <<: *rolebinding_target
      namespace: prow
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      <<: *rolebinding_target
      namespace: test-pods
      name: .*
    path: patches/JsonRFC6902/prow-jobs-namespace.yaml
  - target: &clusterrolebinding_target
      group: rbac.authorization.k8s.io
      version: v1
      kind: ClusterRoleBinding
      name: prow-rehearse
    path: patches/JsonRFC6902/rolebinding-subject-prow-namespace.yaml
  - target:
      <<: *clusterrolebinding_target
      name: test-subset
    path: patches/JsonRFC6902/rolebinding-subject-prow-namespace.yaml
  - target:
      <<: *rolebinding_target
      namespace: test-pods
      name: .*
    path: patches/JsonRFC6902/rolebinding-subject-prow-namespace.yaml
  - target:
      <<: *role_target
      namespace: test-pods
      name: deck
    path: patches/JsonRFC6902/prow-jobs-rolebinding-rules.yaml
  - target:
      <<: *ingress_target
      namespace: default
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      <<: *ingress_target
      namespace: prow
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      version: v1
      kind: Secret
      namespace: default
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml
  - target:
      group: batch
      version: v1
      kind: CronJob
      namespace: default
      name: .*
    path: patches/JsonRFC6902/prow-namespace.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: config
    files:
      - configs/config/config.yaml
  - name: label-config
    files:
      - configs/labels/labels.yaml
  - name: plugins
    files:
      - configs/plugins/plugins.yaml

secretGenerator:
  - &github_token
    name: github-token
    files:
      - appid=secrets/github/app-id
      - cert=secrets/github/app-secret
      # For backward compatibility
      - oauth=secrets/github/bot-token
      - token=secrets/github/bot-token
    type: Opaque
  - <<: *github_token
    namespace: kubevirt-prow-jobs
  - &oauth_token
    name: oauth-token
    files:
      - oauth=secrets/github/bot-token
    type: Opaque
  - <<: *oauth_token
    namespace: kubevirt-prow-jobs
  - &gcs_credentials
    name: gcs-credentials
    files:
      - secrets/service-account.json
    type: Opaque
  - <<: *gcs_credentials
    namespace: kubevirt-prow-jobs
  # For backward compatibility
  - <<: *gcs_credentials
    name: gcs
  - <<: *gcs_credentials
    name: gcs
    namespace: kubevirt-prow-jobs
  - name: bazel-cache-gcs
    namespace: kubevirt-prow-jobs
    files:
      - secrets/prow/google/service-accounts/bazel-cache/bazel-cache-sa.json
    type: Opaque
  - name: virtci-gcs
    namespace: kubevirt-prow-jobs
    files:
      - secrets/virtci-service-account.json
    type: Opaque
  - name: hmac-token
    files:
      - hmac=secrets/github/hmac-token
    type: Opaque
  - name: slack-token
    files:
      - token=secrets/slack/token
    type: Opaque
  - name: cookie
    files:
      - secret=secrets/cookie
    type: Opaque
  - name: github-oauth-config
    files:
      - secret=secrets/github-oauth-config
    type: Opaque
  - name: kubeconfig
    files:
      - config=secrets/kubeconfig
    type: Opaque
  - name: kubevirtci-docker-credential
    namespace: kubevirt-prow-jobs
    # username=dockerUser
    # password=dockerPass
    envs:
    - secrets/kubevirtci-docker-credential
    type: Opaque

  - name: kubevirtci-quay-credential
    namespace: kubevirt-prow-jobs
    # username=quayUser
    # password=quayPass
    envs:
    - secrets/kubevirtci-quay-credential
    type: Opaque
  - name: kubevirtci-installer-pull-token
    namespace: kubevirt-prow-jobs
    files:
      # installerPullToken
      - token=secrets/kubevirtci-installer-pull-token
    type: Opaque
  - name: commenter-oauth-token
    namespace: kubevirt-prow-jobs
    # githubCommenterToken
    files:
      - oauth=secrets/commenter-oauth-token
    type: Opaque
  - name: kubevirtci-coveralls-token
    namespace: kubevirt-prow-jobs
    files:
      # coverallsToken
      - token=secrets/kubevirtci-coveralls-token
    type: Opaque
  - name: containerized-data-importer-coveralls-token
    namespace: kubevirt-prow-jobs
    files:
      # coverallsToken for the containerized-data-importer repository
      - token=secrets/containerized-data-importer-coveralls-token
    type: Opaque
  - name: kubevirtci-fossa-token
    namespace: kubevirt-prow-jobs
    files:
      # fossaToken
      - token=secrets/kubevirtci-fossa-token
    type: Opaque
  - name: prow-kubevirtbot-github-ssh-secret
    namespace: kubevirt-prow-jobs
    files:
      # prowKubevirtbotSSHPrivateKey
      - token=secrets/prow-kubevirtbot-github-ssh-secret
    type: Opaque
