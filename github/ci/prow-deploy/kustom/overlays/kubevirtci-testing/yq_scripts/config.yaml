.plank.job_url_template = "https://deck.prowdeploy.ci/view/gcs/kubernetes-prow/{{if eq .Spec.Type \"presubmit\"}}pr-logs/pull{{else if eq .Spec.Type \"batch\"}}pr-logs/pull{{else}}logs{{end}}{{if .Spec.Refs}}{{if ne .Spec.Refs.Org \"\"}}/{{.Spec.Refs.Org}}_{{.Spec.Refs.Repo}}{{end}}{{end}}{{if eq .Spec.Type \"presubmit\"}}/{{with index .Spec.Refs.Pulls 0}}{{.Number}}{{end}}{{else if eq .Spec.Type \"batch\"}}/batch{{end}}/{{.Spec.Job}}/{{.Status.BuildID}}/"
| .presets[2].volumes[0].hostPath.path = "/var/lib/stdci/shared/kubevirt-images/kubernetes-prow"
| .deck.spyglass.gcs_browser_prefix = "https://gcsweb.prowdeploy.ci/gcs/"
