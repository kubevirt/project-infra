---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: label-sync-kubevirt
spec:
  schedule: "17 23 * * *"    # Every day 23:17 / 11:17PM
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
        app: label-sync
    spec:
      template:
        spec:
          containers:
            - name: label-sync
              image: gcr.io/k8s-staging-test-infra/label_sync:v20260714-c52c557180
              command: [ "/ko-app/label_sync" ]
              args:
              - --config=/etc/config/labels.yaml
              - --github-endpoint=http://ghproxy
              - --github-endpoint=https://api.github.com
              - --github-app-id=$(GITHUB_APP_ID)
              - --github-app-private-key-path=/etc/github/cert
              - --confirm=true
              - --orgs=kubevirt
              env:
                 - name: GITHUB_APP_ID
                   valueFrom:
                     secretKeyRef:
                       name: github-token
                       key: appid
              volumeMounts:
              - name: config
                mountPath: /etc/config
                readOnly: true
              - name: github-token
                mountPath: /etc/github
                readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
          restartPolicy: Never
          volumes:
          - name: config
            configMap:
              name: label-config
          - name: github-token
            secret:
              secretName: github-token
