---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: prow-specify
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prow-specify
rules:
  - apiGroups:
      - prow.k8s.io
    resources:
      - prowjobs
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prow-specify
roleRef:
  apiGroup: rbac.authorization.k8s.io
  name: prow-specify
  kind: ClusterRole
subjects:
  - kind: ServiceAccount
    name: prow-specify
    namespace: default
