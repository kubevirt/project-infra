periodics:
  - name: periodic-publish-kubemacpool-flakefinder-weekly-report
    cron: "50 0 * * *"
    cluster: kubevirt-prow-control-plane
    annotations:
      testgrid-create-test-group: "false"
    labels:
      preset-gcs-credentials: "true"
      preset-github-credentials: "true"
    spec:
      containers:
        - image: quay.io/kubevirtci/flakefinder:v202607231917-ca75c4e
          command:
          - /usr/bin/flakefinder
          args:
            - --dry-run=false
            - --token=/etc/github/token
            - --merged=168h
            - --report_output_child_path=k8snetworkplumbingwg/kubemacpool
            - --org=k8snetworkplumbingwg
            - --repo=kubemacpool
            - --skip_results_before_start_of_report=false
            - --pr_base_branch=main
  - name: periodic-publish-kubemacpool-flakefinder-daily-report
    cron: "30 0 * * *"
    cluster: kubevirt-prow-control-plane
    annotations:
      testgrid-create-test-group: "false"
    labels:
      preset-gcs-credentials: "true"
      preset-github-credentials: "true"
    spec:
      containers:
        - image: quay.io/kubevirtci/flakefinder:v202607231917-ca75c4e
          command:
          - /usr/bin/flakefinder
          args:
            - --dry-run=false
            - --token=/etc/github/token
            - --merged=24h
            - --report_output_child_path=k8snetworkplumbingwg/kubemacpool
            - --org=k8snetworkplumbingwg
            - --repo=kubemacpool
            - --skip_results_before_start_of_report=false
            - --pr_base_branch=main
  - name: periodic-publish-kubemacpool-flakefinder-four-weekly-report
    interval: 168h
    annotations:
      testgrid-create-test-group: "false"
    labels:
      preset-gcs-credentials: "true"
      preset-github-credentials: "true"
    cluster: kubevirt-prow-control-plane
    spec:
      containers:
        - image: quay.io/kubevirtci/flakefinder:v202607231917-ca75c4e
          command:
          - /usr/bin/flakefinder
          args:
            - --dry-run=false
            - --token=/etc/github/token
            - --merged=672h
            - --report_output_child_path=k8snetworkplumbingwg/kubemacpool
            - --org=k8snetworkplumbingwg
            - --repo=kubemacpool
            - --skip_results_before_start_of_report=false
            - --pr_base_branch=main
