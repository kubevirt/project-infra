periodics:
- name: periodic-project-infra-retester
  interval: 1h  # Retest at most 1 PR every hour, which should not DOS the queue.
  decorate: true
  annotations:
    testgrid-create-test-group: "false"
  cluster: kubevirt-prow-control-plane
  extra_refs:
  - org: kubevirt
    repo: project-infra
    base_ref: main
  spec:
    containers:
    - image: quay.io/kubevirtci/golang:v20260417-7427ea2
      command:
      - "/usr/local/bin/runner.sh"
      - "/bin/sh"
      - "-ce"
      - >
        go run ./robots/retester
        --token=/etc/github/oauth
        --ceiling=1
        --confirm
      env:
      - name: GIMME_GO_VERSION
        value: "1.25.1"
      volumeMounts:
      - name: token
        mountPath: /etc/github
    volumes:
    - name: token
      secret:
        secretName:  commenter-oauth-token
- name: periodic-project-infra-close
  interval: 1h
  annotations:
    testgrid-create-test-group: "false"
  labels:
    preset-github-credentials: "true"
  decorate: true
  cluster: kubevirt-prow-control-plane
  spec:
    containers:
    - image: gcr.io/k8s-staging-test-infra/commenter:v20260325-0ac3b4d79f
      command:
      - /ko-app/commenter
      args:
      - |-
        --query=org:kubevirt
          -label:lifecycle/frozen
          label:lifecycle/rotten
      - --updated=720h
      - --token=/etc/github/oauth
      - |-
        --comment=Rotten issues close after 30d of inactivity.
        Reopen the issue with `/reopen`.
        Mark the issue as fresh with `/remove-lifecycle rotten`.

        /close
      - --template
      - --ceiling=10
      - --confirm
- name: periodic-project-infra-rotten
  interval: 1h
  annotations:
    testgrid-create-test-group: "false"
  labels:
    preset-github-credentials: "true"
  decorate: true
  cluster: kubevirt-prow-control-plane
  spec:
    containers:
    - image: gcr.io/k8s-staging-test-infra/commenter:v20260325-0ac3b4d79f
      command:
      - /ko-app/commenter
      args:
      - |-
        --query=org:kubevirt
          -label:lifecycle/frozen
          label:lifecycle/stale
          -label:lifecycle/rotten
      - --updated=720h
      - --token=/etc/github/oauth
      - |-
        --comment=Stale issues rot after 30d of inactivity.
        Mark the issue as fresh with `/remove-lifecycle rotten`.
        Rotten issues close after an additional 30d of inactivity.

        If this issue is safe to close now please do so with `/close`.

        /lifecycle rotten
      - --template
      - --ceiling=10
      - --confirm
- name: periodic-project-infra-stale
  interval: 1h
  annotations:
    testgrid-create-test-group: "false"
  labels:
    preset-github-credentials: "true"
  decorate: true
  cluster: kubevirt-prow-control-plane
  spec:
    containers:
    - image: gcr.io/k8s-staging-test-infra/commenter:v20260325-0ac3b4d79f
      command:
      - /ko-app/commenter
      args:
      - |-
        --query=org:kubevirt
          -label:lifecycle/frozen
          -label:lifecycle/stale
          -label:lifecycle/rotten
          is:public
      - --updated=2160h
      - --token=/etc/github/oauth
      - |-
        --comment=Issues go stale after 90d of inactivity.
        Mark the issue as fresh with `/remove-lifecycle stale`.
        Stale issues rot after an additional 30d of inactivity and eventually close.

        If this issue is safe to close now please do so with `/close`.

        /lifecycle stale
      - --template
      - --ceiling=10
      - --confirm
- name: periodic-project-infra-needs-approver-review
  interval: 1h
  annotations:
    testgrid-create-test-group: "false"
  labels:
    preset-github-credentials: "true"
  decorate: true
  cluster: kubevirt-prow-control-plane
  spec:
    containers:
    - image: gcr.io/k8s-staging-test-infra/commenter:v20260325-0ac3b4d79f
      command:
      - /ko-app/commenter
      args:
      - |-
        --query=org:kubevirt
          is:open
          is:pr
          label:lgtm
          -label:approved
          -label:do-not-merge/work-in-progress
          -label:needs-approver-review
          -review:changes-requested
          is:public
      - --updated=168h
      - --token=/etc/github/oauth
      - |-
        --comment=Pull requests that are marked with `lgtm` should receive a review
        from an approver within 1 week.

        After that period the bot marks them with the label `needs-approver-review`.

        /label needs-approver-review
      - --template
      - --ceiling=10
      - --confirm
- name: periodic-project-infra-cleanup-needs-approver-review
  interval: 1h
  annotations:
    testgrid-create-test-group: "false"
  labels:
    preset-github-credentials: "true"
  decorate: true
  cluster: kubevirt-prow-control-plane
  spec:
    containers:
    - image: gcr.io/k8s-staging-test-infra/commenter:v20260325-0ac3b4d79f
      command:
      - /ko-app/commenter
      args:
      - |-
        --query=org:kubevirt
          is:closed
          is:pr
          label:needs-approver-review
          is:public
      - --token=/etc/github/oauth
      - |-
        --comment=/remove-label needs-approver-review
      - --include-closed
      - --template
      - --ceiling=10
      - --confirm
- name: periodic-project-infra-dependabot-skip-review
  interval: 1h
  annotations:
    testgrid-create-test-group: "false"
  decorate: true
  cluster: kubevirt-prow-control-plane
  spec:
    containers:
    - image: gcr.io/k8s-staging-test-infra/commenter:v20260325-0ac3b4d79f
      command:
      - /ko-app/commenter
      args:
      - |-
        --query=repo:kubevirt/project-infra
          is:open
          is:pr
          author:app/dependabot
          -label:skip-review
      - --token=/etc/github/oauth
      - |-
        --comment=Dependabot PRs are automatically labeled for merge
        once all required presubmit tests pass.

        /label skip-review
        /test all
      - --template
      - --ceiling=10
      - --confirm
      volumeMounts:
      - name: token
        mountPath: /etc/github
    volumes:
    - name: token
      secret:
        secretName: commenter-oauth-token
- name: periodic-project-infra-autoowners
  interval: 24h
  annotations:
    testgrid-create-test-group: "false"
  labels:
    preset-github-credentials: "true"
  decorate: true
  extra_refs:
  - org: kubevirt
    repo: project-infra
    base_ref: main
  cluster: kubevirt-prow-control-plane
  spec:
    containers:
    - image: quay.io/kubevirtci/autoowners:v20240827-7a3c1cc
      command:
      - "autoowners"
      args:
      - --dry-run=false
      - --assign=kubevirt/prow-job-taskforce
      - --self-approve=true
      - --github-login=kubevirt-bot
      - --github-endpoint=http://ghproxy
      - --github-endpoint=https://api.github.com
      - --org=kubevirt
      - --repo=project-infra
      - --pr-base-branch=main
      - --target-dir=.
      - --target-subdir=github/ci/prow-deploy/files
      - --config-subdir=jobs
      - --github-token-path=/etc/github/oauth
      - --git-signoff=true
- name: periodic-update-flakefinder-indexpage
  interval: 24h
  annotations:
    testgrid-create-test-group: "false"
  labels:
    preset-gcs-credentials: "true"
  decorate: true
  cluster: kubevirt-prow-control-plane
  spec:
    containers:
      - image: quay.io/kubevirtci/indexpagecreator:v20250106-68dbb05
        command:
        - /usr/bin/indexpagecreator
        args:
          - --dry-run=false
- name: periodic-kubevirt-mirror-uploader
  cron: "05 7 * * *"
  max_concurrency: 1
  annotations:
    testgrid-create-test-group: "false"
  labels:
    preset-gcs-credentials: "true"
    preset-github-credentials: "true"
  decorate: true
  decoration_config:
    timeout: 1h
    grace_period: 5m
  extra_refs:
  - org: kubevirt
    repo: project-infra
    base_ref: main
    workdir: true
  - org: kubevirt
    repo: kubevirt
    base_ref: main
  - org: kubevirt
    repo: containerized-data-importer
    base_ref: main
  - org: kubevirt
    repo: kubevirt-aie
    base_ref: release-1.8-aie-nv
  cluster: kubevirt-prow-control-plane
  spec:
    securityContext:
      runAsUser: 0
    containers:
      - image: quay.io/kubevirtci/pr-creator:v20260425-dd70848
        command:
        - /usr/local/bin/runner.sh
        - /bin/bash
        - -ce
        args:
        - |
          git-pr.sh \
            --command "go run ./robots/uploader -workspace ${PWD}/../kubevirt/WORKSPACE -dry-run=false" \
            --repo-path ../kubevirt \
            --repo kubevirt \
            --labels skip-review \
            --release-note-none \
            --target main
          git-pr.sh \
            --command "go run ./robots/uploader -workspace ${PWD}/../containerized-data-importer/WORKSPACE -dry-run=false" \
            --repo-path ../containerized-data-importer \
            --repo containerized-data-importer \
            --labels skip-review \
            --release-note-none \
            --target main
          git-pr.sh \
            --command "go run ./robots/uploader -workspace ${PWD}/../kubevirt-aie/WORKSPACE -dry-run=false" \
            --repo-path ../kubevirt-aie \
            --repo kubevirt-aie \
            --labels skip-review \
            --release-note-none \
            --target release-1.8-aie-nv
        resources:
          requests:
            memory: "200Mi"
