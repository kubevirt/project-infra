- annotations:
    testgrid-create-test-group: "false"
  cluster: kubevirt-prow-control-plane
  decorate: true
  decoration_config:
    timeout: 1h
    grace_period: 5m
  extra_refs:
  - org: kubevirt
    repo: project-infra
    base_ref: main
    workdir: true
  interval: 168h
  labels:
    preset-bazel-cache: "true"
    preset-gcs-credentials: "true"
    preset-github-credentials: "true"
  max_concurrency: 1
  name: periodic-project-infra-perf-report-creator
  spec:
    containers:
    - image: quay.io/kubevirtci/golang:v20260417-7427ea2
      env:
        - name: KUBEVIRT_PROVIDER
          value: k8s-1.34
        - name: GIMME_GO_VERSION
          value: "1.25.1"
        - name: GIT_AUTHOR_NAME
          value: kubevirt-bot
        - name: GIT_AUTHOR_EMAIL
          value: kubevirtbot@redhat.com
        - name: TARGET_GITHUB_REPO
          value: kubevirt/ci-performance-benchmarks
      command:
        - "/usr/local/bin/runner.sh"
        - "/bin/sh"
        - "-ce"
        - |
          go build -o /usr/local/bin/perf-report-creator ./robots/perf-report-creator/...
          (
            cd ..
            git clone "https://kubevirt-bot@github.com/$TARGET_GITHUB_REPO.git"
            cd ci-performance-benchmarks
            git config user.email "$GIT_AUTHOR_EMAIL"
            git config user.name "$GIT_AUTHOR_NAME"
          )
          scrape_dir=$(mktemp -d)
          ci_perf_repo_dir=$(cd ../ci-performance-benchmarks && pwd)
          ./robots/perf-report-creator/scrape.sh $GOOGLE_APPLICATION_CREDENTIALS $ci_perf_repo_dir $scrape_dir $KUBEVIRT_PROVIDER
          ./robots/perf-report-creator/graph.sh $ci_perf_repo_dir $KUBEVIRT_PROVIDER
          cd $ci_perf_repo_dir
          git add -A results weekly
          current_date=$(date --iso-8601=date)
          git commit --signoff -m "Periodic data update from $current_date"
          git push "https://kubevirt-bot@github.com/$TARGET_GITHUB_REPO.git" HEAD:main
      resources:
        requests:
          memory: "1Gi"

# Check the health of the Prow workloads clusters.
# They appear in the testgrid dashboard: https://testgrid.k8s.io/kubevirt-project-infra-periodics
# Failures are notified by testgrid to the KubeVirt CI maintainers mailing list.
- &cluster_livez_job
  name: periodic-project-infra-prow-workloads-livez
  annotations: &cluster_livez_annotations
    testgrid-dashboards: kubevirt-project-infra-periodics
    testgrid-days-of-results: "30"
    testgrid-num-failures-to-alert: "1"
    testgrid-alert-email: kubevirt-ci-maintainers@redhat.com
  cluster: kubevirt-prow-control-plane
  decorate: true
  decoration_config:
    timeout: 5m
    grace_period: 1m
  extra_refs:
  - org: kubevirt
    repo: project-infra
    base_ref: main
    clone_depth: 1
  interval: 1h
  labels:
    preset-github-credentials: "true"
    preset-pgp-bot-key: "true"
  max_concurrency: 1
  spec:
    containers:
    - &cluster_livez_container
      image: quay.io/kubevirtci/bootstrap:v20260417-7427ea2
      command:
      - /usr/local/bin/runner.sh
      - /bin/bash
      - -ceu
      args:
      - |
        source ./hack/manage-secrets.sh
        decrypt_secrets
        install -Dm400 "${secrets_repo_dir}"/secrets/kubeconfigs/"${CLUSTER_KUBECONFIG_NAME}" ~/.kube/config
        cleanup_secrets

        kubectl get --raw "${CLUSTER_LIVEZ_ENDPOINT:-/livez}?verbose"
      env:
      - name: CLUSTER_KUBECONFIG_NAME
        value: prow-workloads
      resources: &cluster_livez_resources
        requests:
          memory: 100Mi
      securityContext:
        runAsUser: 0
