- name: periodic-kubevirtci-cluster-unsupported-version-remover
  cron: "30 3 * * *"
  max_concurrency: 1
  annotations:
    testgrid-create-test-group: "false"
  labels:
    preset-github-credentials: "true"
  decorate: true
  decoration_config:
    timeout: 1h
    grace_period: 5m
  extra_refs:
  - org: kubevirt
    repo: project-infra
    base_ref: main
    workdir: true
  - org: kubevirt
    repo: kubevirtci
    base_ref: main
  cluster: kubevirt-prow-control-plane
  spec:
    securityContext:
      runAsUser: 0
    containers:
      - image: quay.io/kubevirtci/pr-creator:v20260425-dd70848
        command:
        - /usr/local/bin/runner.sh
        - /bin/bash
        - -ce
        args:
          - |
            TEMP_FILE=$(mktemp)
            if ! go run ./robots/kubevirt check providers \
              --job-config-path-kubevirt-presubmits=${PWD}/github/ci/prow-deploy/files/jobs/kubevirt/kubevirt/kubevirt-presubmits.yaml \
              --job-config-path-kubevirt-periodics=${PWD}/github/ci/prow-deploy/files/jobs/kubevirt/kubevirt/kubevirt-periodics.yaml \
              --output-file=${TEMP_FILE} \
              --overwrite=true \
              --github-token-path= \
              --dry-run=false ; then
              cat ${TEMP_FILE}
              echo "unsupported kubevirtci providers are still in use, cancelling removal of unsupported kubevirtci providers!"
              exit 0
            fi
            git-pr.sh \
              --command "go run ./robots/kubevirtci-bumper -ensure-only-latest-three --k8s-provider-dir ${PWD}/../kubevirtci/cluster-provision/k8s --cluster-up-dir ${PWD}/../kubevirtci/cluster-up/cluster" \
              --repo-path ../kubevirtci \
              --repo kubevirtci \
              --branch remove-unsupported-versions \
              --target main
        resources:
          requests:
            memory: "200Mi"
