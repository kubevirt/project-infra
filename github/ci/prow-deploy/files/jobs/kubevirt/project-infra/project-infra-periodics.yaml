      - "/bin/sh"
      - "-ce"
      - |
        ( cd robots/job-config-validator && go build ./... )

        source ./hack/manage-secrets.sh
        decrypt_secrets
        install -Dm400 "${secrets_repo_dir}"/secrets/kubeconfigs/kubevirt-prow-control-plane ~/.kube/config
        cleanup_secrets

        ./robots/job-config-validator/job-config-validator
      resources:
