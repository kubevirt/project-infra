postsubmits:
  kubevirt/kubevirt-aie-webhook:
  - name: push-tagged-kubevirt-aie-webhook
    branches:
    # branches also handle tags
    - ^v\d+\.\d+\.\d+$
    cluster: prow-workloads
    always_run: true
    skip_report: true
    annotations:
      testgrid-create-test-group: "false"
    decorate: true
    decoration_config:
      timeout: 1h
      grace_period: 5m
    labels:
      preset-podman-in-container-enabled: "true"
      preset-docker-mirror-proxy: "true"
      preset-kubevirtci-quay-credential: "true"
    spec:
      nodeSelector:
        type: bare-metal-external
      containers:
      - image: quay.io/kubevirtci/bootstrap:v20251218-e7a7fc9
        command:
          - "/usr/local/bin/runner.sh"
          - "/bin/sh"
          - "-c"
          - |
            cat "$QUAY_PASSWORD" | docker login --username $(cat "$QUAY_USER") --password-stdin=true quay.io &&
            DOCKER_TAG=$(git describe --tags --exact-match) make image-build image-push &&
            DOCKER_TAG=latest make image-build image-push
        # docker-in-docker needs privileged mode
        securityContext:
          privileged: true
        resources:
          requests:
            memory: "8Gi"
