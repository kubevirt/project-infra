presubmits:
  kubevirt/kubevirt:
  - always_run: false
    annotations:
      fork-per-release: "true"
      testgrid-dashboards: kubevirt-presubmits
    cluster: prow-workloads
    decorate: true
    decoration_config:
      grace_period: 5m0s
      timeout: 2h0m0s
    labels:
      preset-bazel-cache: "true"
      preset-docker-mirror-proxy: "true"
      preset-podman-in-container-enabled: "true"
      preset-podman-shared-images: "true"
      preset-shared-images: "true"
    max_concurrency: 4
    name: pull-kubevirt-e2e-k8s-1.34-sig-performance
    run_if_changed: ^cmd/.*|^rpm/.*|^tests/performance/.*|^hack/perftests.sh|^tools/perfscale-audit/.*|^bazel/.*|^third_party/.*|^staging/src/.*|^api/.*|^pkg/virt-.*|^pkg/controller/.*|^pkg/monitoring/.*
    skip_branches:
    - release-\d+\.\d+
    spec:
      containers:
      - command:
        - /usr/local/bin/runner.sh
        - /bin/sh
        - -ce
        - |
          # Build the perfscale-audit binary
          make bazel-build

          # Create k8s cluster
          make cluster-up

          # Push and deploy kubevirt
          make cluster-sync

          FUNC_TEST_ARGS="--no-color --seed=42" make perftest
        env:
        - name: KUBEVIRT_PROVIDER
          value: k8s-1.34
        - name: KUBEVIRT_STORAGE
          value: hpp
        - name: KUBEVIRT_MEMORY_SIZE
          value: 16G
        - name: KUBEVIRT_NUM_NODES
          value: "4"
        - name: KUBEVIRT_DEPLOY_PROMETHEUS
          value: "true"
        - name: KUBEVIRT_PROVIDER_EXTRA_ARGS
          value: --prometheus-port 30007
        - name: KUBEVIRT_WITH_ETC_CAPACITY
          value: 1G
        - name: KUBEVIRT_WITH_ETC_IN_MEMORY
          value: "true"
        image: quay.io/kubevirtci/bootstrap:v20260707-cacb217
        name: ""
        resources:
          requests:
            cpu: "12"
            memory: 73Gi
        securityContext:
          privileged: true
      nodeSelector:
        type: bare-metal-external
  - always_run: false
    annotations:
      fork-per-release: "true"
