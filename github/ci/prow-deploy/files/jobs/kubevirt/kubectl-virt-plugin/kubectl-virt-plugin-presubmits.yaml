presubmits:
  kubevirt/kubectl-virt-plugin:
  - name: pull-kubectl-virt-plugin-check-create-release
    skip_branches:
    - release-\d+\.\d+
    annotations:
      fork-per-release: "true"
    always_run: false
    run_if_changed: "scripts/.*"
    optional: false
    decorate: true
    decoration_config:
      timeout: 1h
      grace_period: 5m
    max_concurrency: 6
    cluster: kubevirt-prow-control-plane
    spec:
      containers:
      - image: quay.io/kubevirtci/bootstrap:v20260417-7427ea2
        command:
        - /bin/sh
        - -ce
        args:
        - ./scripts/create-latest-release.sh --dry-run
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: 100Mi
