periodics:
- name: periodic-kubectl-virt-plugin-publish
  cron: "0 0 * * *"
  decorate: true
  annotations:
    testgrid-create-test-group: "false"
  decoration_config:
    timeout: 1h
    grace_period: 5m
  max_concurrency: 1
  extra_refs:
  - org: kubevirt
    repo: kubectl-virt-plugin
    base_ref: main
    clone_depth: 1
  - org: kubevirt
    repo: project-infra
    base_ref: main
    clone_depth: 1
  labels:
    preset-github-credentials: "true"
  cluster: kubevirt-prow-control-plane
  spec:
    containers:
      - image: quay.io/kubevirtci/bootstrap:v20260417-7427ea2
        env:
          - name: GITHUB_USER
            value: kubevirt-bot
          - name: GITHUB_EMAIL
            value: kubevirtbot@redhat.com
        command:
          - /bin/sh
          - -ce
        args:
          - ./scripts/create-latest-release.sh
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: 100Mi
