presubmits:
  kubevirt/iommufd-device-plugin:
  - name: pull-iommufd-device-plugin-unit-tests
    branches:
      - main
    annotations:
      fork-per-release: "true"
      testgrid-create-test-group: "false"
    always_run: true
    optional: false
    skip_report: false
    cluster: prow-workloads
    decorate: true
    decoration_config:
      timeout: 10m
      grace_period: 5m
    max_concurrency: 11
    labels:
      preset-podman-in-container-enabled: "true"
      preset-docker-mirror-proxy: "true"
      preset-shared-images: "true"
    spec:
      nodeSelector:
        type: bare-metal-external
      containers:
        - image: quay.io/kubevirtci/golang:v20260417-7427ea2
          command:
            - "/usr/local/bin/runner.sh"
            - "/bin/sh"
            - "-c"
            - "make test"
          env:
            - name: GIMME_GO_VERSION
              value: "1.24.11"
          # docker-in-docker needs privileged mode
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "10Gi"
  - name: pull-iommufd-device-plugin-lint
    branches:
      - main
    annotations:
      fork-per-release: "true"
      testgrid-create-test-group: "false"
    always_run: true
    optional: false
    skip_report: false
    cluster: prow-workloads
    decorate: true
    decoration_config:
      timeout: 10m
      grace_period: 5m
    max_concurrency: 11
    labels:
      preset-podman-in-container-enabled: "true"
      preset-docker-mirror-proxy: "true"
      preset-shared-images: "true"
    spec:
      nodeSelector:
        type: bare-metal-external
      containers:
        - image: quay.io/kubevirtci/golang:v20260417-7427ea2
          command:
            - "/usr/local/bin/runner.sh"
            - "/bin/sh"
            - "-c"
            - "make lint"
          env:
            - name: GIMME_GO_VERSION
              value: "1.24.11"
          # docker-in-docker needs privileged mode
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "10Gi"
  - name: pull-iommufd-device-plugin-image-build
    branches:
      - main
    annotations:
      fork-per-release: "true"
      testgrid-create-test-group: "false"
    always_run: true
    optional: false
    skip_report: false
    cluster: prow-workloads
    decorate: true
    decoration_config:
      timeout: 10m
      grace_period: 5m
    max_concurrency: 11
    labels:
      preset-podman-in-container-enabled: "true"
      preset-docker-mirror-proxy: "true"
      preset-shared-images: "true"
    spec:
      nodeSelector:
        type: bare-metal-external
      containers:
        - image: quay.io/kubevirtci/golang:v20260417-7427ea2
          command:
            - "/usr/local/bin/runner.sh"
            - "/bin/sh"
            - "-c"
            - "make image-build"
          env:
            - name: GIMME_GO_VERSION
              value: "1.24.11"
          # docker-in-docker needs privileged mode
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "10Gi"
  - name: pull-iommufd-device-plugin-functest
    branches:
      - main
    annotations:
      fork-per-release: "true"
      testgrid-create-test-group: "false"
    always_run: true
    optional: false
    skip_report: false
    cluster: prow-workloads
    decorate: true
    decoration_config:
      timeout: 3h
      grace_period: 5m
    max_concurrency: 11
    labels:
      preset-podman-in-container-enabled: "true"
      preset-docker-mirror-proxy: "true"
    spec:
      nodeSelector:
