periodics:
- annotations:
    testgrid-create-test-group: "false"
  cluster: kubevirt-prow-control-plane
  cron: "50 3 * * *"
  decorate: true
  decoration_config:
    ssh_key_secrets:
    - prow-kubevirtbot-github-ssh-secret
  extra_refs:
  - base_ref: master
    org: kubevirt
    repo: secrets
    clone_uri: "git@github.com:kubevirt/secrets.git"
    clone_depth: 1
  labels:
    preset-github-credentials: "true"
  name: periodic-secrets-check-public-pgp-key-expiry
  reporter_config:
    slack:
      job_states_to_report: []
  spec:
    containers:
    - env:
      - name: GIMME_GO_VERSION
        value: "1.18"
      image: quay.io/kubevirtci/golang:v20260417-7427ea2
      command: [ "/usr/local/bin/runner.sh", "/bin/bash", "-ce" ]
      args:
      - |
        go run ./cmd/check-public-key-expiry/main.go
- name: periodic-secrets-rotate-grafana-token
  cron: "@monthly"
  max_concurrency: 1
  annotations:
    testgrid-create-test-group: "true"
    testgrid-dashboards: kubevirt-project-infra-periodics
    testgrid-days-of-results: "30"
    testgrid-num-failures-to-alert: "1"
    testgrid-alert-email: kubevirt-ci-maintainers@redhat.com
  labels:
    preset-github-credentials: "true"
    preset-pgp-bot-key: "true"
  decorate: true
  decoration_config:
    timeout: 1h
    grace_period: 5m
  extra_refs:
  - org: kubevirt
    repo: project-infra
    base_ref: main
    workdir: true
    clone_depth: 1
  cluster: kubevirt-prow-control-plane
  spec:
    securityContext:
      runAsUser: 0
    containers:
    - image: quay.io/kubevirtci/pr-creator:v20260427-c0f350d
      command:
      - /usr/local/bin/runner.sh
      - /bin/bash
      - -ce
      args:
      - |
        source ./hack/manage-secrets.sh
        decrypt_secrets
        install -Dm400 "${secrets_repo_dir}"/secrets/kubeconfigs/kubevirt-prow-control-plane ~/.kube/config

        kubectl create token grafana-sa -n monitoring --duration=1440h > "${secrets_repo_dir}"/secrets/grafana/prometheus-token
        [ -s "${secrets_repo_dir}"/secrets/grafana/prometheus-token ] || echo "ERROR: failed to create token" && exit 1

        hack/git-pr.sh \
          --command "true" \
          --repo-path "${secrets_repo_dir}" \
          --command-path "${secrets_repo_dir}" \
          --branch rotate-grafana-token \
          --repo secrets \
          --target master \
          --summary "chore(secrets): rotate grafana prometheus token"
      resources:
        requests:
          memory: "200Mi"
