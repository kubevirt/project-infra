periodics:
- annotations:
    testgrid-create-test-group: "false"
  cluster: kubevirt-prow-control-plane
  cron: "50 3 * * *"
  decorate: true
  decoration_config:
    ssh_key_secrets:
    - prow-kubevirtbot-github-ssh-secret
  extra_refs:
  - base_ref: master
    org: kubevirt
    repo: secrets
    clone_uri: "git@github.com:kubevirt/secrets.git"
    clone_depth: 1
  labels:
    preset-github-credentials: "true"
  name: periodic-secrets-check-public-pgp-key-expiry
  reporter_config:
    slack:
      job_states_to_report: []
  spec:
    containers:
    - env:
      - name: GIMME_GO_VERSION
        value: "1.18"
      image: quay.io/kubevirtci/golang:v20260417-7427ea2
      command: [ "/usr/local/bin/runner.sh", "/bin/bash", "-ce" ]
      args:
      - |
        go run ./cmd/check-public-key-expiry/main.go
- name: periodic-secrets-rotate-grafana-token
  cron: "0 0 1 * *"
  max_concurrency: 1
  annotations:
    testgrid-create-test-group: "true"
    testgrid-dashboards: kubevirt-project-infra-periodics
    testgrid-days-of-results: "30"
    testgrid-num-failures-to-alert: "1"
    testgrid-alert-email: kubevirt-ci-maintainers@redhat.com
  labels:
    preset-pgp-bot-key: "true"
  decorate: true
  decoration_config:
    timeout: 1h
    grace_period: 5m
    ssh_key_secrets:
    - prow-kubevirtbot-github-ssh-secret
  extra_refs:
  - org: kubevirt
    repo: secrets
    base_ref: master
    clone_uri: "git@github.com:kubevirt/secrets.git"
    workdir: true
  cluster: kubevirt-prow-control-plane
  spec:
    securityContext:
      runAsUser: 0
    containers:
    - image: quay.io/kubevirtci/golang:v20260417-7427ea2
      command:
      - /usr/local/bin/runner.sh
      - /bin/bash
      - -ce
      args:
      - |
        gpg --allow-secret-key-import --import /etc/pgp/token
        git-crypt unlock

        install -Dm400 secrets/kubeconfigs/kubevirt-prow-control-plane ~/.kube/config

        TOKEN=$(kubectl create token grafana-sa -n monitoring --duration=1440h)

        [ -z "$TOKEN" ] && echo "ERROR: failed to create token" && exit 1

        echo -n "$TOKEN" > secrets/grafana/prometheus-token

        kubectl patch secret grafana -n monitoring \
          -p "{\"stringData\":{\"prom_bearer_token\":\"$TOKEN\"}}"

        git config user.email "kubevirtbot@redhat.com"
        git config user.name "kubevirt-bot"
        git add secrets/grafana/prometheus-token
        git commit --signoff -m "periodic: rotate grafana prometheus token"
        git push origin HEAD:master
      resources:
        requests:
          memory: "200Mi"
