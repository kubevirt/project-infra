periodics:
- name: periodic-virt-template-publish-staging-main-nightly
  cron: 2 1 * * *
  cluster: kubevirt-prow-control-plane
  max_concurrency: 1
  annotations:
    testgrid-create-test-group: "false"
  labels:
    preset-github-credentials: "true"
  decorate: true
  decoration_config:
    grace_period: 5m0s
    timeout: 1h0m0s
  extra_refs:
  - base_ref: main
    org: kubevirt
    repo: virt-template
  spec:
    containers:
    - command:
      - /usr/local/bin/runner.sh
      - /bin/sh
      - -c
      - |
        export GIT_ASKPASS="/usr/local/bin/git-askpass.sh"
        hack/publish-staging.sh
      env:
      - name: GO_MOD_PATH
        value: "go.mod"
      image: quay.io/kubevirtci/pr-creator:v20260506-920f941
      resources:
        requests:
          memory: 200Mi
- name: periodic-update-virt-template-kubevirt-main
  cron: 0 2 * * *
  cluster: kubevirt-prow-control-plane
  max_concurrency: 1
  annotations:
    testgrid-create-test-group: "false"
  labels:
    preset-github-credentials: "true"
    preset-podman-in-container-enabled: "true"
  decorate: true
  decoration_config:
    grace_period: 5m0s
    timeout: 1h0m0s
  extra_refs:
  - org: kubevirt
    repo: kubevirt
    base_ref: main
  spec:
    containers:
    - image: quay.io/kubevirtci/pr-creator:v20260506-920f941
      env:
      - name: VIRT_TEMPLATE_BRANCH
        value: release-0.1
      - name: KUBEVIRT_BRANCH
        value: main
      command:
      - /usr/local/bin/runner.sh
      - /bin/bash
      - -c
      - |
        export GIT_ASKPASS=/usr/local/bin/git-askpass.sh
        latest_version=$(curl --fail -s https://api.github.com/repos/kubevirt/virt-template/releases | jq -r '.[] | select(.target_commitish == '\""${VIRT_TEMPLATE_BRANCH}"\"') | .tag_name' | head -n1)
        description="Automated update of virt-template to ${latest_version}\n\n\\\`\\\`\\\`release-note\nUpdated virt-template to ${latest_version}\n\\\`\\\`\\\`"

        git-pr.sh \
          --command "cd ../kubevirt && hack/virt-template/bump.sh ${VIRT_TEMPLATE_BRANCH} && make generate" \
          --repo-path ../kubevirt \
          --description-command "echo -e \"${description}\"" \
          --repo kubevirt \
          --branch update-virt-template-main \
          --target "${KUBEVIRT_BRANCH}" \
          --missing-labels lgtm,approved,do-not-merge/hold
      resources:
        requests:
          memory: 2Gi
      securityContext:
        privileged: true
