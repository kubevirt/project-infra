  - name: pull-containerized-data-importer-e2e-s390x
    skip_branches:
      - release-v\d+\.\d+
    annotations:
      fork-per-release: "true"
      testgrid-dashboards: kubevirt-containerized-data-importer-presubmits
    always_run: true
    optional: true
    decoration_config:
      timeout: 6h
      grace_period: 10m
    max_concurrency: 1
    cluster: kubevirt-prow-control-plane
    extra_refs:
    - org: kubevirt
      repo: project-infra
      base_ref: main
    labels:
      preset-podman-in-container-enabled: "true"
      preset-docker-mirror-proxy: "true"
      preset-kubevirtci-quay-credential: "true"
      preset-github-credentials: "true"
      preset-pgp-bot-key: "true"
    spec:
      containers:
        - image: quay.io/kubevirtci/bootstrap:v20260715-af3e234
          env:
          - name: KUBECONFIG
            value: /kubeconfig
          - name: TARGET
            value: external
          - name: BUILD_ARCH
            value: crossbuild-s390x
          - name: ARCHITECTURE
            value: s390x
          - name: PULL_POLICY
            value: Always
          - name: CDI_NAMESPACE
            value: cdi
          - name: CDI_E2E_SKIP
            value: "Destructive|Cert rotation|cdi-apiserver tests|Importer Test Suite-prometheus|test_id:3996|test_id:8266"
          - name: SNAPSHOT_SC
            value: ocs-storagecluster-ceph-rbd
          - name: BLOCK_SC
            value: ocs-storagecluster-ceph-rbd
          - name: CSICLONE_SC
            value: ocs-storagecluster-ceph-rbd
          - name: CDI_LABEL_FILTER
            value: "!VDDK && !ImageIO"
          - name: UPLOAD_PROXY_URL_OVERRIDE
            value: "https://cdi-uploadproxy-cdi.apps.odf.cdi.ci:6005"
          command:
            - "/usr/local/bin/runner.sh"
            - "/bin/sh"
            - "-c"
            - |
              source ../project-infra/hack/manage-secrets.sh
              decrypt_secrets
              install -m400 "${secrets_repo_dir}"/secrets/kubeconfigs/prow-s390x-openshift /kubeconfig
              cleanup_secrets

              cat "$QUAY_PASSWORD" | docker login --username $(cat "$QUAY_USER") --password-stdin=true quay.io
              echo "195.212.74.206 api.odf.cdi.ci oauth-openshift.apps.odf.cdi.ci cdi-uploadproxy-cdi.apps.odf.cdi.ci" >> /etc/hosts

              kubectl delete cdi cdi --ignore-not-found --timeout=120s
              kubectl delete ns cdi --ignore-not-found --timeout=120s
              automation/test.sh
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "8Gi"
