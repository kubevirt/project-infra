---
- name: copy production kustomize files
  copy:
    src: '{{ project_infra_root }}/github/ci/prow-deploy/kustom/overlays/kubevirt-prow-control-plane/{{ item }}'
    dest: '{{ project_infra_root }}/github/ci/prow-deploy/kustom/overlays/{{ deploy_environment }}'
  delegate_to: '{{ inventory_hostname }}'
  loop:
    - kustomization.yaml
    - patches
    - resources

- name: prepare production resources for testing usage
  block:
    - name: patch ghproxy pvc class
      shell: |
        yq -i '.spec.storageClassName = "local"' {{ project_infra_root }}/github/ci/prow-deploy/kustom/overlays/{{ deploy_environment }}/patches/StrategicMerge/ghproxy.yaml
    - name: patch greenhouse and docker-mirror-proxy pvc size
      shell: |
        yq -i '.spec.resources.requests.storage = "10Gi"' {{ project_infra_root }}/github/ci/prow-deploy/kustom/components/greenhouse/pv/resources/pvc.yaml
        yq -i '.spec.resources.requests.storage = "10Gi"' {{ project_infra_root }}/github/ci/prow-deploy/kustom/overlays/{{ deploy_environment }}/resources/docker-mirror-proxy_pvc.yaml
    - name: patch ingresses
      shell: |
        yq -i '. *d load("{{ project_infra_root }}/github/ci/prow-deploy/kustom/overlays/{{ deploy_environment }}/patches/StrategicMerge/{{ item }}-ingress.yaml")' {{ project_infra_root }}/github/ci/prow-deploy/kustom/base/manifests/local/{{ item }}-ingress.yaml
        yq -i 'del(.spec.tls[0].secretName)' {{ project_infra_root }}/github/ci/prow-deploy/kustom/base/manifests/local/{{ item }}-ingress.yaml
      loop:
        - deck
        - gcsweb
    - name: remove resource patching
      shell: |
        yq -i 'map(select(.path != "/spec/template/spec/containers/0/resources"))' {{ project_infra_root }}/github/ci/prow-deploy/kustom/overlays/{{ deploy_environment }}/patches/JsonRFC6902/{{ item }}.yaml
      loop:
        - deck_deployment
        - prow_controller_manager_deployment
    - name: create hmac secret
      shell: |
        kubectl create secret -n kubevirt-prow generic hmac-token --from-file=hmac={{ project_infra_root }}/github/ci/prow-deploy/kustom/overlays/{{ deploy_environment }}/resources/hmac.yaml
      changed_when: false
      environment:
        KUBECONFIG: '{{ kubeconfig_path }}'

    - name: Create kubeconfig secret
      copy:
        src: '{{ kubeconfig_path }}'
        dest: '{{ secrets_dir }}/kubeconfig'
        remote_src: true

    - name: Create kubeconfig-build-test-infra-trusted secret
      copy:
        src: '{{ kubeconfig_path }}'
        dest: '{{ secrets_dir }}/kubeconfig-build-test-infra-trusted'
        remote_src: true

    - name: Create kubeconfig-build-k8s-prow-builds
      copy:
        src: '{{ kubeconfig_path }}'
        dest: '{{ secrets_dir }}/kubeconfig-build-k8s-prow-builds'
        remote_src: true

    - name: Create kubeconfig-build-rules-k8s
      copy:
        src: '{{ kubeconfig_path }}'
        dest: '{{ secrets_dir }}/kubeconfig-build-rules-k8s'
        remote_src: true
