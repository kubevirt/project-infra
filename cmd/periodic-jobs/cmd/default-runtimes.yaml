# Default estimated runtimes for periodic job SIGs (in hours)
# These estimates are used to visualize job durations in the Gantt chart.
#
# Override with your own file using: --runtimes path/to/your-runtimes.yaml

runtimes:
  sig-compute-migrations: 3.0
  sig-compute-root: 4.0
  sig-compute: 4.0
  sig-operator-root: 2.0
  sig-operator: 2.0
  sig-storage-root: 3.5
  sig-storage: 3.5
  sig-network-with-dnc: 2.5
  sig-network: 2.5
  sig-monitoring: 1.5
  sig-performance: 2.0

# Default fallback for unmatched SIGs
default: 2.0
